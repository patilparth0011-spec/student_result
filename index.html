<!DOCTYPE html>
<html>
<head>
<title>Student Result</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:white;
    padding:30px;
    border-radius:15px;

    margin:10px;
    padding:10px;
    width:90%;
}
button {
    padding:10px 20px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>
<div class="box">
<h2>Student Result System</h2>

<form action="insert.php" method="post">
<input type="text" name="name" placeholder="Enter Name" required><br>
<input type="number" name="m1" placeholder="Marks 1" required><br>
<input type="number" name="m2" placeholder="Marks 2" required><br>

</html>
